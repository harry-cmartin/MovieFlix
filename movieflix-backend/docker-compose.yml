version: '3.8'

services:
  # 1. Banco de Dados PostgreSQL
  postgres-db:
    image: postgres:15-alpine
    container_name: movieflix_db
    restart: always
    env_file:
      - .env
    environment:
      #  substitui pelos valores do .env
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432" # Expõe a porta 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data # Persiste os dados se o container cair
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./movieflix-backend/docker/data/dataLake:/data/dataLake

  # 2. (Nginx)
  nginx-proxy:
    image: nginx:alpine
    container_name: movieflix_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      # Mapeia o arquivo de configuração para dentro do container
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend-api # Só sobe o Nginx depois que a API estiver de pé

  # 3.(Backend)

  backend-api:
    build:
      context: .
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: movieflix_backend
    restart: on-failure
    environment:
      # Passando as credenciais do banco para o Quarkus via variável de ambiente
      QUARKUS_DATASOURCE_USERNAME: ${POSTGRES_USER}
      QUARKUS_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres-db:5432/${POSTGRES_DB}
    depends_on:
      - postgres-db

volumes:
  postgres_data: